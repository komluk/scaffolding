name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify-version-match:
    name: verify tag matches plugin.json version
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      tag: ${{ steps.check.outputs.tag }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Check tag vs plugin.json
        id: check
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION=$(jq -r .version .claude-plugin/plugin.json)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [ "v${VERSION}" != "${TAG}" ]; then
            echo "ERROR: git tag ${TAG} does not match plugin.json version v${VERSION}"
            exit 1
          fi
          echo "tag and plugin.json version match: ${TAG}"

  run-validation:
    name: run validation (release gate)
    needs: [verify-version-match]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - name: jq check plugin.json
        run: jq . .claude-plugin/plugin.json > /dev/null
      - name: jq check marketplace.json
        run: jq . .claude-plugin/marketplace.json > /dev/null
      - name: jq check settings.json
        run: jq . settings.json > /dev/null
      - name: bash -n hooks/*.sh
        run: |
          for f in hooks/*.sh; do
            [ -f "$f" ] || continue
            bash -n "$f"
          done

  create-github-release:
    name: create github release
    needs: [verify-version-match, run-validation]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes
